<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Task Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Kanban Task Board</h1>
    <p class="subtitle">
    Organize and track your daily tasks
</p>

    <form id="taskForm">
        <input
            type="text"
            id="taskInput"
            placeholder="Enter a task"
            required
        >
        <button type="submit">Add Task</button>
    </form>

    <div class="board">

        <div class="column">
            <h2>To Do</h2>
            <div
                class="task-list"
                id="todo"
                ondragover="allowDrop(event)"
                ondrop="drop(event)">
            </div>
        </div>

        <div class="column">
            <h2>In Progress</h2>
            <div
                class="task-list"
                id="progress"
                ondragover="allowDrop(event)"
                ondrop="drop(event)">
            </div>
        </div>

        <div class="column">
            <h2>Done</h2>
            <div
                class="task-list"
                id="done"
                ondragover="allowDrop(event)"
                ondrop="drop(event)">
            </div>
        </div>

        <div class="stats">
    <div class="box">
        <span id="totalTasks">0</span>
        <p>Total Tasks</p>
    </div>
</div>

    </div>

    <script src="script.js"></script>

</body>
</html>
